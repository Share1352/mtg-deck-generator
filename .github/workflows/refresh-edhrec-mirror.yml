name: Refresh EDHREC mirror

on:
  schedule:
    - cron: '0 7 * * *'   # 07:00 UTC daily
  workflow_dispatch:
    inputs:
      top_n:
        description: 'How many per-theme synergy pages to mirror'
        required: false
        default: '200'

permissions:
  contents: write

concurrency:
  group: edhrec-mirror
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prefetch EDHREC into public/data/edhrec
        run: node scripts/prefetch-edhrec.js --top-n=${{ github.event.inputs.top_n || '200' }}

      - name: Commit changes to main (if any)
        env:
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
        run: |
          git add public/data/edhrec
          if git diff --cached --quiet; then
            echo "No EDHREC mirror changes to commit."
            exit 0
          fi
          git commit -m "chore: refresh EDHREC mirror data"
          git push origin HEAD:${GITHUB_REF_NAME}

      - name: Mirror to data/edhrec-mirror branch
        env:
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
        run: |
          git fetch origin data/edhrec-mirror || true
          # Create or reset the mirror branch from current main snapshot
          git checkout -B data/edhrec-mirror
          git push -f origin data/edhrec-mirror
