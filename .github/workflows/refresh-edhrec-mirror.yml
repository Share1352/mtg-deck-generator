name: Refresh EDHREC mirror

on:
  schedule:
    - cron: '0 7 * * *'   # 07:00 UTC daily
  workflow_dispatch:
    inputs:
      top_n:
        description: 'How many per-theme synergy pages to mirror'
        required: false
        default: '1000'

permissions:
  contents: write

concurrency:
  group: edhrec-mirror
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prefetch EDHREC into public/data/edhrec
        run: node scripts/prefetch-edhrec.js --top-n=${{ github.event.inputs.top_n || '1000' }}

      - name: Verify EDHREC mirror
        run: node scripts/verify-edhrec-mirror.js

      - name: Commit changes to main (if any)
        id: commit_main
        env:
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
        run: |
          git add public/data/edhrec
          if git diff --cached --quiet; then
            echo "No EDHREC mirror changes to commit."
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            git commit -m "chore: refresh EDHREC mirror data"
            git push origin HEAD:main
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Create or update data/edhrec-mirror branch
        id: update_mirror
        env:
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
        run: |
          git fetch origin data/edhrec-mirror 2>/dev/null || true
          git checkout -B data/edhrec-mirror
          git push -f origin data/edhrec-mirror
          echo "pushed=true" >> $GITHUB_OUTPUT

      - name: Print summary
        if: always()
        run: |
          echo "main changed: ${{ steps.commit_main.outputs.changed || 'false' }}"
          echo "mirror branch pushed: ${{ steps.update_mirror.outputs.pushed || 'false' }}"
          node --input-type=module -e "
          import { readFileSync, existsSync } from 'node:fs';
          const p = 'public/data/edhrec/manifest.json';
          if (!existsSync(p)) { console.log('manifest: not found'); process.exit(0); }
          const m = JSON.parse(readFileSync(p, 'utf8'));
          console.log('generatedAt:', m.generatedAt ?? 'n/a');
          console.log('themePagesFetched:', m.themePagesFetched ?? 'n/a');
          console.log('totalDiscoveredSlugs:', m.totalDiscoveredSlugs ?? 'n/a');
          console.log('sourceCounts:', JSON.stringify(m.sourceCounts ?? {}));
          " 2>/dev/null || echo "manifest summary unavailable"
